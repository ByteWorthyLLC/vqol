name: Bug report
description: Report a reproducible problem in vqol.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include browser, device, route, and practice config changes if relevant.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Local verification
      description: Paste output from `npm run verify` if you ran it.
    validations:
      required: false
