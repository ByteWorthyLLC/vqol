<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">vqol social preview</title>
  <desc id="desc">Static local-first patient outcomes PWA preview.</desc>
  <rect width="1280" height="640" fill="#ffffff"/>
  <rect x="64" y="64" width="1152" height="512" rx="28" fill="#f6f9fc" stroke="#d8e2ec" stroke-width="2"/>
  <text x="112" y="158" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="#1a1a1a">vqol</text>
  <text x="112" y="220" font-family="Inter, Arial, sans-serif" font-size="30" fill="#2a5a8a">patient outcomes as a static PWA</text>
  <text x="112" y="294" font-family="Inter, Arial, sans-serif" font-size="28" fill="#1a1a1a">No account. No analytics. No backend by default.</text>
  <text x="112" y="342" font-family="Inter, Arial, sans-serif" font-size="28" fill="#1a1a1a">Patient-owned IndexedDB score history.</text>
  <text x="112" y="390" font-family="Inter, Arial, sans-serif" font-size="28" fill="#1a1a1a">One-file practice fork through practice.json.</text>
  <g transform="translate(820 128)">
    <rect width="292" height="360" rx="18" fill="#ffffff" stroke="#d8e2ec" stroke-width="2"/>
    <text x="28" y="58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#1a1a1a">Demo result</text>
    <rect x="28" y="90" width="236" height="76" rx="10" fill="#f0f6fb" stroke="#2a5a8a"/>
    <text x="48" y="136" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#1a1a1a">55.7</text>
    <text x="138" y="136" font-family="Inter, Arial, sans-serif" font-size="18" fill="#555555">QOL</text>
    <polyline points="32,286 86,250 142,222 204,212 260,196" fill="none" stroke="#2a5a8a" stroke-width="5"/>
    <polyline points="32,302 86,264 142,238 204,222 260,210" fill="none" stroke="#111111" stroke-width="4" stroke-dasharray="8 8"/>
  </g>
</svg>
